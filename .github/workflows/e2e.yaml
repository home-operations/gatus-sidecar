---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: E2E

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - ".release-please-manifest.json"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - ".release-please-manifest.json"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  e2e:
    name: Kind end-to-end
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          cache_key: "mise-e2e-v1-{{file_hash}}"
          install_args: --locked

      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          version: v0.27.0
          cluster_name: gatus-sidecar-e2e
          config: test/e2e/kind-config.yaml
          wait: 60s

      - name: Kubernetes info
        run: |
          kubectl version
          kubectl get nodes

      - name: Run E2E tests
        run: |-
          export KUBECONFIG="${HOME}/.kube/config"
          go test -tags e2e -timeout 10m -v ./test/e2e/...

  helm-e2e:
    name: Helm E2E (kind)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          experimental: true
          install_args: --locked

      - name: Create Kind cluster
        id: kind
        background: true
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          version: v0.30.0
          node_image: kindest/node:v1.34.0
          cluster_name: gatus-sidecar-helm-e2e
          wait: 60s

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Resolve toolchain versions
        id: tools
        run: echo "go=$(mise config get tools.go)" >> "$GITHUB_OUTPUT"

      - name: Build sidecar image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          tags: ghcr.io/home-operations/gatus-sidecar:e2e
          build-args: |
            GO_VERSION=${{ steps.tools.outputs.go }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - wait: kind

      - name: Kubernetes info
        run: |
          kubectl version
          kubectl get nodes

      - name: Load sidecar image into kind
        run: kind load docker-image ghcr.io/home-operations/gatus-sidecar:e2e --name gatus-sidecar-helm-e2e

      - name: Helm install + test
        env:
          GATUS_TEST_IMAGE_TAG: e2e
          GATUS_TEST_PULL_POLICY: Never
        run: |-
          export KUBECONFIG="${HOME}/.kube/config"
          mise run helm-test

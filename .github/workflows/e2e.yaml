---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: E2E

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: Kind end-to-end
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache_key: "mise-e2e-v1-{{file_hash}}"
          install_args: --locked

      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          version: v0.27.0
          cluster_name: gatus-sidecar-e2e
          config: test/e2e/kind-config.yaml
          wait: 60s

      - name: Kubernetes info
        run: |
          kubectl version
          kubectl get nodes

      - name: Run E2E tests
        run: |-
          # kind-action exports KUBECONFIG to ~/.kube/config but does not
          # propagate the env var to later steps, so set it explicitly here.
          export KUBECONFIG="${HOME}/.kube/config"
          go test -tags e2e -timeout 10m -v ./test/e2e/...

apiVersion: v1
kind: Namespace
metadata:
  name: e2e
---
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: e2e-class
  annotations:
    gatus.home-operations.com/endpoint: |
      interval: 45s
spec:
  controller: example.com/e2e
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: e2e-ingress
  namespace: e2e
spec:
  ingressClassName: e2e-class
  tls:
    - hosts:
        - e2e-ingress.example.com
  rules:
    - host: e2e-ingress.example.com
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: e2e-service
                port:
                  number: 80
---
apiVersion: v1
kind: Service
metadata:
  name: e2e-service
  namespace: e2e
  annotations:
    gatus.home-operations.com/enabled: "true"
    gatus.home-operations.com/endpoint: |
      conditions:
        - "[CONNECTED] == true"
        - "[RESPONSE_TIME] < 500"
spec:
  ports:
    - port: 8080
      protocol: TCP
  selector:
    app: e2e
---
apiVersion: v1
kind: Service
metadata:
  name: e2e-service-disabled
  namespace: e2e
  annotations:
    gatus.home-operations.com/enabled: "false"
spec:
  ports:
    - port: 8080
      protocol: TCP
---
# Collides by name with e2e-ingress; the test runs with --prefix-service=svc/
# and --prefix-ingress=ing/ so both endpoints can coexist in Gatus.
apiVersion: v1
kind: Service
metadata:
  name: e2e-ingress
  namespace: e2e
spec:
  ports:
    - port: 9090
      protocol: TCP
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: e2e-gatewayclass
spec:
  controllerName: example.com/e2e
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: e2e-gateway
  namespace: e2e
  annotations:
    gatus.home-operations.com/endpoint: |
      alerts:
        - type: slack
          webhook-url: https://example.com/webhook
spec:
  gatewayClassName: e2e-gatewayclass
  listeners:
    - name: http
      protocol: HTTP
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: e2e-route
  namespace: e2e
spec:
  parentRefs:
    - name: e2e-gateway
  hostnames:
    - e2e-route.example.com

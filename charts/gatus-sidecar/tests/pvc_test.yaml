suite: pvc
templates:
  - pvc.tpl
tests:
  - it: renders nothing when persistence is disabled (the default)
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a PVC at the requested size and access mode when persistence is enabled
    set:
      persistence.enabled: true
      persistence.size: 5Gi
      persistence.storageClass: fast
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: RELEASE-NAME-gatus-sidecar
      - equal:
          path: spec.resources.requests.storage
          value: 5Gi
      - contains:
          path: spec.accessModes
          content: ReadWriteOnce
      - equal:
          path: spec.storageClassName
          value: fast

  - it: omits storageClassName when storageClass is empty
    set:
      persistence.enabled: true
    asserts:
      - notExists:
          path: spec.storageClassName

  - it: renders nothing when persistence.existingClaim is set (the chart manages no PVC)
    set:
      persistence.enabled: true
      persistence.existingClaim: my-claim
    asserts:
      - hasDocuments:
          count: 0

suite: poddisruptionbudget
templates:
  - pdb.tpl
  - _helpers.tpl
set:
  config.existingConfigMap: gatus-config
tests:
  - it: renders no PDB by default
    template: pdb.tpl
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a PDB with minAvailable when enabled
    template: pdb.tpl
    set:
      podDisruptionBudget.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: metadata.name
          value: RELEASE-NAME-gatus-sidecar
      - equal:
          path: spec.minAvailable
          value: 1
      - notExists:
          path: spec.maxUnavailable

  - it: prefers maxUnavailable when it is set
    template: pdb.tpl
    set:
      podDisruptionBudget.enabled: true
      podDisruptionBudget.maxUnavailable: 1
    asserts:
      - equal:
          path: spec.maxUnavailable
          value: 1
      - notExists:
          path: spec.minAvailable

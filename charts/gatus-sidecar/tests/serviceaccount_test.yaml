suite: serviceaccount
templates:
  - serviceaccount.tpl
tests:
  - it: creates a ServiceAccount that automounts the token by default
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: automountServiceAccountToken
          value: true

  - it: renders nothing when serviceAccount.create is false
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

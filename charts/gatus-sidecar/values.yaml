---
# Default values for gatus.
#
# This chart deploys upstream Gatus (ghcr.io/twin/gatus) together with the
# home-operations gatus-sidecar (ghcr.io/home-operations/gatus-sidecar) as a
# native sidecar. The sidecar discovers cluster endpoints and writes them into a
# shared config volume that gatus reads.
#
# The chart does NOT render gatus config — set `config.existingConfigMap` to a
# ConfigMap you manage and list its keys under `config.items`.
#
# Most strings, lists, and maps below are rendered through Helm's `tpl`, so you
# can embed template expressions and have them resolve at install time, e.g.:
#
#   httpRoute:
#     hostnames:
#       - "status.{{ .Values.global.domain }}"

# -- Number of gatus replicas. Gatus is backed by a Deployment; with persistence enabled (a single RWO PVC) keep this at 1.
replicaCount: 1

# Upstream Gatus — image and runtime settings. This image is pulled, never built
# by this repo.
gatus:
  image:
    # -- Gatus image repository.
    repository: ghcr.io/twin/gatus
    # -- Gatus image tag (Renovate-managed). Also becomes the chart appVersion at package time.
    tag: "v5.36.0"
    # -- Pin the gatus image by digest (sha256:…); when set, overrides the tag.
    digest: ""
    # -- Gatus image pull policy.
    pullPolicy: IfNotPresent
  # -- Directory gatus reads (GATUS_CONFIG_PATH). The shared volume is mounted here; the sidecar writes its generated YAML here and the BYO ConfigMap files are overlaid on top. The chart always sets GATUS_CONFIG_PATH to this.
  configPath: /config
  # -- Container port, Service targetPort and probe port. Also exported as GATUS_WEB_PORT so your config can use `web.port: ${GATUS_WEB_PORT}`; gatus's actual listen port comes from its config file, so reference this var or match it.
  port: 8080
  # -- Gatus log level (GATUS_LOG_LEVEL: DEBUG, INFO, WARN, ERROR). Omitted when empty.
  logLevel: INFO
  # -- Delay gatus startup by N seconds (GATUS_DELAY_START_SECONDS). Omitted when empty or 0.
  delayStartSeconds: ""
  # -- Extra environment variables for the gatus container, as a map (templated), e.g. TZ or `${VAR}` substitution values referenced by your config.
  env: {}
  #   TZ: UTC
  # -- Extra environment variables for the gatus container, as a raw list (templated).
  extraEnv: []
  #   - name: GOMEMLIMIT
  #     value: "200MiB"
  # -- Sources of environment variables for the gatus container (templated), e.g. a Secret holding buddy.yaml Pushover tokens.
  envFrom: []
  #   - secretRef:
  #       name: gatus-secrets
  # -- Gatus container securityContext (no privilege escalation, read-only root filesystem, drops ALL capabilities).
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  # -- Gatus liveness probe.
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 20
  # -- Gatus readiness probe.
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
  # -- Gatus startup probe (optional). Gates liveness/readiness while gatus starts; empty disables it.
  startupProbe: {}
  #   httpGet:
  #     path: /health
  #     port: http
  #   periodSeconds: 5
  #   failureThreshold: 30

# home-operations gatus-sidecar — a native sidecar that watches the cluster and
# generates gatus endpoints.
sidecar:
  # -- Run the gatus-sidecar as a native sidecar (init container with restartPolicy: Always).
  enabled: true
  image:
    # -- gatus-sidecar image repository.
    repository: ghcr.io/home-operations/gatus-sidecar
    # -- Overrides the sidecar image tag; defaults to the chart version (the sidecar repo's own release). The release pipeline pins the digest instead.
    tag: ""
    # -- Pin the sidecar image by digest (sha256:…); set by the release pipeline. When set, overrides the tag.
    digest: ""
    # -- gatus-sidecar image pull policy.
    pullPolicy: IfNotPresent
  # -- Namespace to watch (--namespace); empty watches all namespaces (requires a ClusterRole).
  namespace: ""
  # -- Gateway name(s) to filter HTTPRoutes (--gateway-name, repeated per entry).
  gatewayNames: []
  # -- Ingress class(es) to filter Ingresses (--ingress-class, repeated per entry).
  ingressClasses: []
  # -- File the sidecar writes generated YAML to (--output); empty defaults to `<gatus.configPath>/gatus-sidecar.yaml` (in the shared volume).
  output: ""
  # -- Default probe interval for generated endpoints (--default-interval).
  defaultInterval: 1m
  # -- Include paths from match rules in probe URLs (--probe-paths); false probes bare hostnames.
  probePaths: true
  # -- Annotation key for the per-resource YAML config override (--annotation-config); empty uses the sidecar default.
  annotationConfig: ""
  # -- Annotation key for enabling/disabling per-resource processing (--annotation-enabled); empty uses the sidecar default.
  annotationEnabled: ""
  # -- Sidecar log level (--log-level: debug, info, warn, error).
  logLevel: info
  # -- Per-kind discovery. `enable` turns the kind on; `auto` also auto-creates endpoints for matching resources; `prefix` prepends to generated endpoint names. RBAC rules are derived from whichever kinds are enabled. The default (httproute auto + service enable) mirrors the maintainer's real usage.
  kinds:
    ingress:
      enable: false
      auto: false
      prefix: ""
    httproute:
      enable: false
      auto: true
      prefix: ""
    service:
      enable: true
      auto: false
      prefix: ""
    ingressroute:
      enable: false
      auto: false
      prefix: ""
  # -- Extra raw flags appended to the sidecar args, e.g. `["--foo=bar"]`.
  extraArgs: []
  # -- Extra environment variables for the sidecar container, as a raw list (templated).
  extraEnv: []
  # -- gatus-sidecar container securityContext (no privilege escalation, read-only root filesystem, drops ALL capabilities).
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

# Gatus configuration — supplied as an external ConfigMap; this chart never
# renders config. Set a Reloader annotation under `deploymentAnnotations`
# (e.g. reloader.stakater.com/auto) if you want the pod to roll when the
# ConfigMap changes.
config:
  # -- REQUIRED: name of a ConfigMap holding your gatus config file(s) (templated, so a release-derived name works).
  existingConfigMap: ""
  # -- ConfigMap keys to mount read-only into gatus.configPath; each `{ key, path }` mounts the ConfigMap's `key` at `<configPath>/<path>` (subPath).
  items: []
  #   - key: config.yaml
  #     path: config.yaml
  #   - key: buddy.yaml
  #     path: buddy.yaml

serviceAccount:
  # -- Create a ServiceAccount.
  create: true
  # -- Automount the ServiceAccount API token (on by default: the sidecar needs Kubernetes API access to discover endpoints).
  automount: true
  # -- Annotations for the ServiceAccount.
  annotations: {}
  # -- ServiceAccount name; generated from the release name if empty.
  name: ""

rbac:
  # -- Create RBAC (a (Cluster)Role + binding) granting the sidecar the access it needs.
  create: true
  # -- RBAC scope: ClusterRole (watch all namespaces) or Role (single namespace; pair with the sidecar's `namespace`).
  type: ClusterRole
  # -- Extra policy rules appended to the derived rules. The base rules are generated from the enabled `sidecar.kinds` (least privilege, get/list/watch), so you normally leave this empty.
  extraRules: []
  #   - apiGroups: [""]
  #     resources: [secrets]
  #     verbs: [get, list, watch]

persistence:
  # -- Persist gatus.configPath (the sidecar's generated YAML and any sqlite DB) on a PVC. Disabled by default → the shared volume is an emptyDir and gatus runs in-memory (set memory storage in your config).
  enabled: false
  # -- Use an existing PVC instead of creating one; when set, no PVC is rendered.
  existingClaim: ""
  # -- StorageClass for the PVC; empty uses the cluster default.
  storageClass: ""
  # -- PVC access mode.
  accessMode: ReadWriteOnce
  # -- PVC size.
  size: 1Gi

# -- Image pull secrets for private registries.
imagePullSecrets: []
# -- Override the chart name used in resource names.
nameOverride: ""
# -- Override the full release name.
fullnameOverride: ""

# -- Annotations added to the Deployment (workload) metadata, e.g. `reloader.stakater.com/auto: "true"` so Stakater Reloader rolls the pod when the mounted config ConfigMap changes (Reloader reads the workload, not the pod).
deploymentAnnotations: {}
# -- Annotations added to the pod.
podAnnotations: {}
# -- Labels added to the pod.
podLabels: {}

# -- Pod-level securityContext (runs as non-root uid/gid 65532 with fsGroup so the shared /config volume is writable).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  fsGroupChangePolicy: OnRootMismatch

# -- Pod-level resource requests/limits — the Kubernetes `Pod.spec.resources` field, one budget shared by the gatus and sidecar containers (no need to split it per container). Needs Kubernetes 1.34+, where PodLevelResources is beta and on by default; the chart's kubeVersion enforces this. Empty leaves it unset.
resources: {}
#   limits:
#     memory: 256Mi
#   requests:
#     cpu: 50m
#     memory: 128Mi

service:
  # -- Service type.
  type: ClusterIP
  # -- Service port (matches the gatus web/container port; /metrics is served here too).
  port: 8080

monitoring:
  serviceMonitor:
    # -- Create a Prometheus Operator ServiceMonitor (requires its CRDs). Scrapes the http port at `path`.
    enabled: false
    # -- Scrape interval.
    interval: 30s
    # -- Scrape timeout.
    scrapeTimeout: 10s
    # -- Metrics path (served on the gatus web port).
    path: /metrics
    # -- ServiceMonitor labels.
    labels: {}
    # -- ServiceMonitor annotations.
    annotations: {}
    # -- Prometheus metric relabelings.
    metricRelabelings: []
    # -- Prometheus relabelings.
    relabelings: []

ingress:
  # -- Expose the UI via an Ingress.
  enabled: false
  # -- IngressClass name.
  className: ""
  # -- Ingress annotations.
  annotations: {}
  # -- Ingress hosts and their paths.
  hosts:
    - host: gatus.example.com
      paths:
        - path: /
          pathType: Prefix
  # -- Ingress TLS configuration.
  tls: []
  # - secretName: gatus-tls
  #   hosts:
  #     - gatus.example.com

# Gateway API HTTPRoute — an alternative to `ingress` for clusters using the
# Gateway API. Renders one HTTPRoute pointing at the app service port. Named
# `httpRoute` (not `route`) to avoid confusion with the OpenShift Route kind.
httpRoute:
  # -- Expose the UI via a Gateway API HTTPRoute (alternative to ingress).
  enabled: false
  # -- HTTPRoute apiVersion; empty defaults to gateway.networking.k8s.io/v1.
  apiVersion: ""
  # -- HTTPRoute kind; empty defaults to HTTPRoute.
  kind: ""
  # -- HTTPRoute annotations.
  annotations: {}
  # -- HTTPRoute labels.
  labels: {}
  # -- Gateways (and listeners) this route attaches to.
  parentRefs: []
  #  - name: gateway
  #    namespace: gateway
  #    sectionName: https
  # -- Hostnames matched against the Host header (templated).
  hostnames: []
  #  - gatus.example.com
  # -- Custom rules prepended before the default rule (templated).
  additionalRules: []
  # -- Filters applied to the default rule.
  filters: []
  # -- Match conditions for the default rule.
  matches:
    - path:
        type: PathPrefix
        value: /
  # -- Redirect HTTP→HTTPS (301) instead of routing to the backend (needs HTTP+HTTPS listeners).
  httpsRedirect: false

# -- Node selector for pod scheduling.
nodeSelector: {}
# -- Tolerations for pod scheduling.
tolerations: []
# -- Affinity rules for pod scheduling.
affinity: {}
# -- PriorityClass for the pod, so gatus is less likely to be preempted/evicted under node pressure. Empty uses the cluster default.
priorityClassName: ""
# -- Grace period for a clean shutdown (gatus drains in-flight checks and closes its servers on SIGTERM).
terminationGracePeriodSeconds: 30

# gatus is effectively single-instance (in-memory state, or a single RWO PVC when
# persistence is on), so this guards only against *voluntary* disruption — node
# drains, autoscaler scale-down.
podDisruptionBudget:
  # -- Create a PodDisruptionBudget. ⚠️ With a single replica, the default `minAvailable: 1` makes a node drain block until you delete the pod yourself; set `maxUnavailable: 1` instead to let drains proceed. Off by default.
  enabled: false
  # -- Minimum pods that must stay available, as a count or percentage. Used unless `maxUnavailable` is set.
  # @schema
  # type: [integer, string]
  # @schema
  minAvailable: 1
  # -- Maximum pods that may be unavailable, as a count or percentage; takes precedence over `minAvailable` when set.
  # @schema
  # type: [integer, string]
  # @schema
  maxUnavailable: ""

# -- Extra initContainers (templated) added to the pod. They run, in order, before the gatus-sidecar native sidecar and the gatus container — use them to prep the shared config volume or wait on a dependency. For a long-running helper, set `restartPolicy: Always` to make it a native sidecar too.
initContainers: []
# -- Additional volumes on the Deployment pod.
volumes: []
# -- Additional volume mounts on the gatus container.
volumeMounts: []

# Config for the chart's `helm test` hook (a pod that curls the Service's /health). Used only by `helm test`, never the workload.
tests:
  image:
    # -- `helm test` connection-pod image; a gcr-mirrored curl, so the test never pulls from Docker Hub.
    repository: mirror.gcr.io/curlimages/curl
    # -- `helm test` image, pinned as `tag@sha256:digest` so Renovate bumps the tag and its digest together.
    tag: "8.20.0@sha256:b3f1fb2a51d923260350d21b8654bbc607164a987e2f7c84a0ac199a67df812a"
    # -- `helm test` image pull policy.
    pullPolicy: IfNotPresent
